<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINC LC-512 GST Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e8e8e8;
            font-family: 'Roboto Mono', monospace;
            padding: 20px;
        }

        .calculator-body {
            background: #3a3a3a;
            border-radius: 4px;
            padding: 18px 14px 14px 14px;
            width: 380px;
            box-shadow:
                0 10px 40px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.1);
            border: 2px solid #2a2a2a;
        }

        .display-area {
            background: #c5c5b8;
            border-radius: 3px;
            padding: 10px 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border: 2px inset #999;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        .display-screen {
            background: #4a5548;
            border-radius: 2px;
            padding: 8px 12px;
            flex: 1;
            margin-right: 10px;
            min-height: 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
            border: 1px solid #3a4538;
        }

        .display-text {
            font-family: 'Orbitron', monospace;
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 0 1px rgba(0,0,0,0.3);
        }

        .brand-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #222;
            letter-spacing: 1px;
        }

        .model-name {
            font-size: 10px;
            font-weight: 700;
            color: #222;
            letter-spacing: 0.5px;
        }

        .feature-text {
            font-size: 7px;
            color: #333;
            font-weight: 700;
            text-align: right;
            line-height: 1.3;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 6px;
        }

        .func-buttons {
            display: flex;
            gap: 4px;
        }

        .func-btn {
            background: #8bb8e8;
            border: none;
            border-radius: 2px;
            padding: 6px 8px;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 2px 0 #6a9ac8, 0 3px 4px rgba(0,0,0,0.2);
            transition: all 0.1s;
            font-family: 'Roboto Mono', monospace;
            min-width: 52px;
            text-align: center;
        }

        .func-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #6a9ac8, inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .solar-panel {
            background: #4a4a4a;
            border-radius: 2px;
            padding: 4px 8px;
            display: flex;
            gap: 2px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
        }

        .solar-cell {
            width: 22px;
            height: 18px;
            background: #2a2a2a;
            border: 1px solid #555;
        }

        .labels-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 2px;
        }

        .label-left {
            font-size: 8px;
            color: #ccc;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .label-right {
            font-size: 8px;
            color: #ccc;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .keypad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: repeat(4, 48px);
            gap: 5px;
        }

        .key {
            background: #555;
            border: none;
            border-radius: 3px;
            color: #ddd;
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 3px 0 #333, 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            user-select: none;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #333, inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .key-num {
            background: #4a4a4a;
            color: #f0f0f0;
            font-size: 20px;
            font-weight: 400;
        }

        .key-op {
            background: #555;
            color: #f0f0f0;
            font-size: 18px;
        }

        .key-special {
            background: #666;
            color: #ddd;
            font-size: 11px;
            font-weight: 700;
        }

        .key-yellow {
            background: #e8d44a;
            color: #333;
            font-size: 14px;
            font-weight: 700;
        }

        .key-yellow:active {
            box-shadow: 0 0 0 #b8a43a, inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .key-tall {
            grid-row: span 2;
            font-size: 28px;
        }

        .key-gst {
            font-size: 10px;
            font-weight: 700;
        }

        .key-rate {
            font-size: 9px;
            font-weight: 700;
        }

        .key-tax {
            font-size: 10px;
            font-weight: 700;
        }

        /* Specific button placements */
        .r1c1 { grid-column: 1; grid-row: 1; }
        .r1c2 { grid-column: 2; grid-row: 1; }
        .r1c3 { grid-column: 3; grid-row: 1; }
        .r1c4 { grid-column: 4; grid-row: 1; }
        .r1c5 { grid-column: 5; grid-row: 1; }
        .r1c6 { grid-column: 6; grid-row: 1; }
        .r1c7 { grid-column: 7; grid-row: 1; }

        .r2c1 { grid-column: 1; grid-row: 2; }
        .r2c2 { grid-column: 2; grid-row: 2; }
        .r2c3 { grid-column: 3; grid-row: 2; }
        .r2c4 { grid-column: 4; grid-row: 2; }
        .r2c5 { grid-column: 5; grid-row: 2; }
        .r2c6 { grid-column: 6; grid-row: 2; }
        .r2c7 { grid-column: 7; grid-row: 2; }

        .r3c1 { grid-column: 1; grid-row: 3; }
        .r3c2 { grid-column: 2; grid-row: 3; }
        .r3c3 { grid-column: 3; grid-row: 3; }
        .r3c4 { grid-column: 4; grid-row: 3; }
        .r3c5 { grid-column: 5; grid-row: 3 / span 2; }
        .r3c6 { grid-column: 6; grid-row: 3; }
        .r3c7 { grid-column: 7; grid-row: 3; }

        .r4c1 { grid-column: 1; grid-row: 4; }
        .r4c2 { grid-column: 2; grid-row: 4; }
        .r4c3 { grid-column: 3; grid-row: 4; }
        .r4c4 { grid-column: 4; grid-row: 4; }
        .r4c6 { grid-column: 6; grid-row: 4; }
        .r4c7 { grid-column: 7; grid-row: 4; }

        @media (max-width: 420px) {
            .calculator-body {
                width: 100%;
                max-width: 360px;
                padding: 14px 10px 10px 10px;
            }
            .keypad {
                grid-template-rows: repeat(4, 44px);
                gap: 4px;
            }
            .key {
                font-size: 14px;
            }
            .key-num {
                font-size: 18px;
            }
            .display-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-body">
        <!-- Display Area -->
        <div class="display-area">
            <div class="display-screen">
                <div class="display-text" id="display">0</div>
            </div>
            <div class="brand-area">
                <div class="brand-name">LINC</div>
                <div class="model-name">LC-512 GST</div>
                <div class="feature-text">CHECK &amp; CORRECT<br>CALCULATOR</div>
            </div>
        </div>

        <!-- Top Function Buttons -->
        <div class="top-controls">
            <div class="func-buttons">
                <button class="func-btn" onclick="checkUp()">CHECK</button>
                <button class="func-btn" onclick="checkDown()">CHECK &darr;</button>
                <button class="func-btn" onclick="correct()">CORRECT</button>
                <button class="func-btn" onclick="autoReplay()">AUTO<br>REPLAY</button>
            </div>
            <div class="solar-panel">
                <div class="solar-cell"></div>
                <div class="solar-cell"></div>
                <div class="solar-cell"></div>
            </div>
        </div>

        <!-- Labels -->
        <div class="labels-row">
            <span class="label-left">100 STEP CHECK</span>
            <span class="label-right">REAL SOLAR CELL</span>
        </div>

        <!-- Keypad -->
        <div class="keypad">
            <!-- Row 1 -->
            <button class="key key-special key-gst r1c1" onclick="gstPlus()">GST+</button>
            <button class="key key-num r1c2" onclick="inputNum('7')">7</button>
            <button class="key key-num r1c3" onclick="inputNum('8')">8</button>
            <button class="key key-num r1c4" onclick="inputNum('9')">9</button>
            <button class="key key-op r1c5" onclick="setOp('/')">&divide;</button>
            <button class="key key-op r1c6" onclick="sqrt()">&radic;</button>
            <button class="key key-yellow r1c7" onclick="grandTotal()">GT</button>

            <!-- Row 2 -->
            <button class="key key-special key-gst r2c1" onclick="gstMinus()">GST-</button>
            <button class="key key-num r2c2" onclick="inputNum('4')">4</button>
            <button class="key key-num r2c3" onclick="inputNum('5')">5</button>
            <button class="key key-num r2c4" onclick="inputNum('6')">6</button>
            <button class="key key-op r2c5" onclick="setOp('*')">&times;</button>
            <button class="key key-op r2c6" onclick="percent()">%</button>
            <button class="key key-special r2c7" onclick="memoryRecall()">M&#9650;</button>

            <!-- Row 3 -->
            <button class="key key-special key-rate r3c1" onclick="rateSet()">RATE<br>SET</button>
            <button class="key key-num r3c2" onclick="inputNum('1')">1</button>
            <button class="key key-num r3c3" onclick="inputNum('2')">2</button>
            <button class="key key-num r3c4" onclick="inputNum('3')">3</button>
            <button class="key key-op key-tall r3c5" onclick="setOp('+')">+</button>
            <button class="key key-op r3c6" onclick="setOp('-')">&minus;</button>
            <button class="key key-special r3c7" onclick="memoryEquals()">M=</button>

            <!-- Row 4 -->
            <button class="key key-special key-tax r4c1" onclick="taxPlus()">TAX+</button>
            <button class="key key-num r4c2" onclick="inputNum('0')">0</button>
            <button class="key key-num r4c3" onclick="inputNum('00')">00</button>
            <button class="key key-num r4c4" onclick="inputDecimal()">.</button>
            <button class="key key-op r4c6" onclick="calculate()">=</button>
            <button class="key key-special r4c7" onclick="memoryPlus()">M+</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let current = '0';
        let prev = null;
        let op = null;
        let resetNext = false;
        let memory = 0;
        let history = [];
        let historyIndex = -1;
        let taxRate = 0;
        let gstRate = 0;

        function updateDisplay() {
            let text = current;
            if (text.length > 12) {
                text = parseFloat(text).toExponential(6);
            }
            display.textContent = text;
        }

        function inputNum(n) {
            if (resetNext) {
                current = '';
                resetNext = false;
            }
            if (current === '0' && n !== '00') {
                current = n;
            } else if (current === '0' && n === '00') {
                current = '0';
            } else {
                current += n;
            }
            updateDisplay();
        }

        function inputDecimal() {
            if (resetNext) {
                current = '0';
                resetNext = false;
            }
            if (!current.includes('.')) {
                current += '.';
            }
            updateDisplay();
        }

        function setOp(operation) {
            if (op !== null && !resetNext) {
                calculate();
            }
            prev = parseFloat(current);
            op = operation;
            resetNext = true;
        }

        function calculate() {
            if (op === null || prev === null) return;
            let curr = parseFloat(current);
            let result;
            switch (op) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/':
                    if (curr === 0) { result = 'Error'; break; }
                    result = prev / curr; break;
                default: return;
            }
            if (result !== 'Error') {
                result = Math.round(result * 1000000000) / 1000000000;
                result = result.toString();
                if (result.length > 12) result = parseFloat(result).toExponential(6);
            }
            history.push({ prev, op, curr, result });
            historyIndex = history.length - 1;
            current = result.toString();
            prev = null;
            op = null;
            resetNext = true;
            updateDisplay();
        }

        function sqrt() {
            let val = parseFloat(current);
            if (val < 0) { current = 'Error'; }
            else {
                let r = Math.sqrt(val);
                r = Math.round(r * 1000000000) / 1000000000;
                current = r.toString();
            }
            resetNext = true;
            updateDisplay();
        }

        function percent() {
            let val = parseFloat(current);
            current = (val / 100).toString();
            updateDisplay();
        }

        function grandTotal() {
            // GT sums all previous calculation results
            let total = history.reduce((sum, h) => {
                let r = parseFloat(h.result);
                return isNaN(r) ? sum : sum + r;
            }, 0);
            total = Math.round(total * 1000000000) / 1000000000;
            current = total.toString();
            resetNext = true;
            updateDisplay();
        }

        // Memory functions
        function memoryPlus() {
            memory += parseFloat(current) || 0;
            resetNext = true;
        }

        function memoryRecall() {
            current = memory.toString();
            resetNext = true;
            updateDisplay();
        }

        function memoryEquals() {
            current = memory.toString();
            resetNext = true;
            updateDisplay();
        }

        // GST / Tax functions
        function rateSet() {
            gstRate = parseFloat(current) || 0;
            taxRate = gstRate;
            resetNext = true;
        }

        function gstPlus() {
            let val = parseFloat(current) || 0;
            let result = val + (val * gstRate / 100);
            result = Math.round(result * 1000000000) / 1000000000;
            current = result.toString();
            resetNext = true;
            updateDisplay();
        }

        function gstMinus() {
            let val = parseFloat(current) || 0;
            let result = val - (val * gstRate / 100);
            result = Math.round(result * 1000000000) / 1000000000;
            current = result.toString();
            resetNext = true;
            updateDisplay();
        }

        function taxPlus() {
            let val = parseFloat(current) || 0;
            let result = val + (val * taxRate / 100);
            result = Math.round(result * 1000000000) / 1000000000;
            current = result.toString();
            resetNext = true;
            updateDisplay();
        }

        // Check & Correct functions
        function checkUp() {
            if (history.length === 0) return;
            historyIndex = Math.max(0, historyIndex - 1);
            let h = history[historyIndex];
            current = h.result.toString();
            updateDisplay();
        }

        function checkDown() {
            if (history.length === 0) return;
            historyIndex = Math.min(history.length - 1, historyIndex + 1);
            let h = history[historyIndex];
            current = h.result.toString();
            updateDisplay();
        }

        function correct() {
            if (history.length > 0 && historyIndex >= 0) {
                history.splice(historyIndex, 1);
                if (historyIndex >= history.length) historyIndex = history.length - 1;
                if (history.length > 0) {
                    current = history[historyIndex].result.toString();
                } else {
                    current = '0';
                }
                updateDisplay();
            }
        }

        function autoReplay() {
            if (history.length === 0) return;
            let i = 0;
            let interval = setInterval(() => {
                if (i >= history.length) { clearInterval(interval); return; }
                current = history[i].result.toString();
                updateDisplay();
                i++;
            }, 600);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputNum(e.key);
            if (e.key === '.') inputDecimal();
            if (e.key === '+') setOp('+');
            if (e.key === '-') setOp('-');
            if (e.key === '*') setOp('*');
            if (e.key === '/') setOp('/');
            if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
            if (e.key === 'Backspace') {
                if (current.length > 1) { current = current.slice(0, -1); }
                else { current = '0'; }
                updateDisplay();
            }
            if (e.key === 'Escape') {
                current = '0'; prev = null; op = null; resetNext = false;
                updateDisplay();
            }
        });
    </script>
</body>
</html>
